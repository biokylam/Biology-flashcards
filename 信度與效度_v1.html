const questionsDatabase = [

        concept: "滲透作用、個體差異與信度",
        scenario: "某學生探究不同濃度的氯化鈉溶液對馬鈴薯細胞體積的影響。 他在每個濃度的溶液中只放入「一條」長度為 50 mm 的馬鈴薯柱體，靜置兩小時後用直尺量度其最終長度，並計算長度的百分比變化。",

                label: "(a)",

            }
        ]

    {

        parts: [
            {
                label: "(a)",
                question: "實驗依賴肉眼判斷「完全分解」，這對實驗數據的收集帶來什麼問題？ (1分)",
                answer: "肉眼判斷帶有<span class='keyword'>主觀性</span>，難以準確且一致地界定「完全液化」的確切時刻，容易產生人為的<span class='keyword'>隨機誤差</span> (1)"
            },
            {
                label: "(b)",
                question: "為了確認「品種A的酶活性較高」這個結論的信度，科學家在操作上應該怎樣做？ (1分)",

        ]

            {
                label: "(a)",

                answer: "<span class='keyword'>方案 II</span> (1)；因為動物體內環境複雜（例如有消化道蠕動、膽汁分泌及其他激素的相互作用），試管實驗未能完全模擬真實體內的生理情況，<span class='keyword'>活體動物實驗</span>較能反映藥物在生物體內發揮的整體效應 (1)。"
            }
        ]
    },
    {
        title: "【第 4 題】",

        parts: [
            {
                label: "(a)",
                question: "指出這項設計在確保實驗效度上的一個主要先天缺陷。 (1分)",

            },

                label: "(b)",

                answer: "在同一片葉子上分別進行實驗及對照處理，可以完全消除不同植株或不同葉片之間因先天特徵（如氣孔分佈密度）所造成的<span class='keyword'>個體差異</span> (1)；這設計確保了觀察到的氣孔狀態差異（因變量）僅是由塗抹抗旱保水劑（自變量）引起，排除了其他植物內部因素的干擾，從而大幅提高<span class='keyword'>實驗效度</span> (1)。"
            }
        ]
    },
    {
        title: "【第 5 題】",
        concept: "生態調查、隨機抽樣與數據代表性",

        parts: [
            {
                label: "(a)",
                question: "儘管小明投擲了 10 個樣方（有進行重複測量），但他的指導老師指出其數據的效度仍然極低。解釋原因。 (1分)",
                answer: "取樣位置只集中在靠近水源且植物密集的單一角落，未能涵蓋草坪的其他微生境（如乾燥處或邊緣），樣本<span class='keyword'>不能代表</span>整個草坪的真實分佈情況 (1)。"
            },
            {
                label: "(b)",
                question: "提出一項具體的抽樣方法修改，以確保收集到的數據能有效地代表整個草坪的真實情況。 (1分)",
                answer: "在整個大草坪範圍內進行<span class='keyword'>隨機抽樣</span>（例如利用網格劃分草坪，並使用隨機數字表來決定投放樣方的坐標）(1)。"
            }
        ]

    {
        title: "【第 6 題】",
        concept: "免疫與抗體測試、半量化數據陷阱、實驗局限",

        parts: [

            },
            {
                label: "(b)",
                question: "識別這項探究方法的兩項科學局限。 (2分)",

            {

                answer: "提升<span class='keyword'>信度</span>：大幅增加志願者的樣本數量（例如招募數百名志願者），並計算平均趨勢，以減低個體差異（如不同人的免疫力強弱）對實驗結果的影響 (1)。<br>提升<span class='keyword'>效度</span>：設立<span class='keyword'>對照組</span>（一組服用藥物，另一組服用外觀相同的安慰劑），以確保抗原量的變化（因變量）純粹由藥物（自變量）引起 (1)。（註：或建議改用能提供精確數值的量化血液測試取代試紙）"

        parts: [

                label: "(a)",
                question: "小志得出結論：「風速越高，植物的蒸騰速率必然越高。」基於他在測量時間上的安排，這結論的效度受到嚴重質疑。請解釋原因。 (2分)",
                answer: "實驗在靠窗的位置於一天內的不同時間進行，期間環境的光強度、環境溫度或相對濕度等均會發生劇烈變化 (1)；這些未能受控的環境因素（應為<span class='keyword'>控制變量</span>）都會直接影響蒸騰速率（因變量），因此無法確定觀察到的氣泡移動速率變化僅是由風速（自變量）引起 (1)。"

            },

    let currentQuestionIndex = 0;

    // 保留你聰明的 renderQuestion 函數 (隱藏空貼士)，並加入清空 AI 對話框的功能
    function renderQuestion() {
        const q = questionsDatabase[currentQuestionIndex];
        let htmlContent = `
            <div class="scenario-box">
                <h3 style="margin-top:0; color: #334155;">${q.title}</h3>
                <p><strong>情境：</strong> ${q.scenario}</p>
            </div>
        `;

        q.parts.forEach(part => {
            // 你的完美邏輯：如果這個 part 的 hint 不是空的，才生成貼士按鈕
            let hintHTML = ""; 
            if (part.hint && part.hint.trim() !== "") {
                const formattedHint = part.hint.replace(/\n/g, '<br>');
                hintHTML = `
                    <details>
                        <summary>💡 俾個貼士我 <span>▼</span></summary>
                        <div class="content">${formattedHint}</div>
                    </details>
                `;
            }
            
            htmlContent += `
                <div class="question-part">
                    <div class="question-text">${part.label} ${part.question}</div>
                    ${hintHTML}
                    <details>
                        <summary>👀 睇參考答案 <span>▼</span></summary>
                        <div class="content">${part.answer}</div>
                    </details>
                </div>
            `;
        });

        document.getElementById('quiz-container').innerHTML = htmlContent;
        document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1} / ${questionsDatabase.length}`;
        
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('next-btn').disabled = currentQuestionIndex === questionsDatabase.length - 1;

        // 【新增】：切換題目時，自動清空舊的 AI 對話紀錄
        document.getElementById('student-input').value = "";
        document.getElementById('ai-response-box').style.display = "none";
    }

    function changeQuestion(step) {
        currentQuestionIndex += step;
        renderQuestion();
    }

    // 【新增】：將資料打包並送給 AI 伺服器的非同步函數
    async function submitToAI() {
        const studentInput = document.getElementById('student-input').value;
        if (!studentInput.trim()) {
            alert("同學，請先輸入你的答案或者問題！");
            return;
        }

        const btn = document.getElementById('submit-btn');
        const responseBox = document.getElementById('ai-response-box');
        const responseText = document.getElementById('ai-response-text');

        // 改變按鈕狀態，顯示正在思考
        btn.disabled = true;
        btn.innerText = "⏳ AI 正在批改中，請稍候...";
        responseBox.style.display = "block";
        responseText.innerHTML = "<span style='color:#64748b;'><em>思考中... (通常需要 3-5 秒)</em></span>";

        // 自動打包目前的題目情境與標準答案給 AI
        const q = questionsDatabase[currentQuestionIndex];
        let contextData = "【情境】：\n" + q.scenario.replace(/<br>/g, "\n") + "\n\n";
        let answerData = "";
        q.parts.forEach(p => {
            contextData += p.label + " " + p.question + "\n";
            answerData += p.label + " " + p.answer.replace(/<[^>]*>?/gm, '') + "\n"; // 移除 HTML 標籤
        });

        try {
            // 呼叫你的 Google Apps Script
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    studentAnswer: studentInput,
                    questionContext: contextData,
                    standardAnswer: answerData
                })
            });

            const data = await response.json();
            
            // 顯示 AI 的回覆（將 \n 換成 <br> 以利排版）
            responseText.innerHTML = data.reply.replace(/\n/g, '<br>');

        } catch (error) {
            responseText.innerHTML = "<span style='color:red;'>❌ 連線失敗。請檢查你的網絡，或確保 GAS 網址已正確貼上。</span>";
            console.error(error);
        } finally {
            // 恢復按鈕
            btn.disabled = false;
            btn.innerText = "📤 再次送出 / 追問";
        }
    }

    window.onload = renderQuestion;
</script>

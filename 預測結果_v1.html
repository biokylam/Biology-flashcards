const questionsDatabase = [
    {
        title: "【第 1 題】",
        concept: "表面積與體積比對酶促反應速率的影響",
        scenario: "學生參考了文獻，利用海藻酸鹽將酵母菌（內含蔗糖酶）固定化，製成海藻酸鹽顆珠。學生將這些顆珠填滿一支圓形玻璃柱，並讓 100 mL 的 10% 蔗糖溶液以固定的流速連續通過玻璃柱。收集流出的液體後，學生利用本生氏測試量度其中的還原糖（葡萄糖和果糖）濃度。<br><br><b>【突發變動 / 假說】</b>：若學生重複此實驗，但改為使用直徑較大的海藻酸鹽顆珠來填滿玻璃柱（玻璃柱的體積及所用顆珠的總體積保持不變，溶液流速亦相同）。",

            }

    },
    {

        concept: "溫度/pH 對酶活性的影響與蛋白質變性",

        parts: [
            {
                label: " ",
                question: "預測在第 5 分鐘後，該曲線的走向會發生什麼變化？請解釋原因。（3分）",
                answer: "<span class='keyword'>預測結果 (1分)：</span>曲線會在第 5 分鐘後立刻變得平坦（呈水平線） / 產物量<span class='keyword'>不再增加</span>，並維持在一個低於原曲線最終水平的數值。(1)<br><span class='keyword'>原理解釋 (2分)：</span>氫氧化鈉是強鹼，會令溶液的 pH 值急劇上升，遠超胃蛋白酶的最佳 pH 值。(1)<br>極端的 pH 變化會破壞胃蛋白酶（蛋白質）的立體結構 / 改變其活性部位的形狀（即酶發生<span class='keyword'>變性</span> denaturation），使其永久失去催化活性，反應立刻停止。(1)"
            }
        ]

    {
        title: "【第 3 題】",

        parts: [

                label: " ",
                question: "倘若上述假說正確，預測電刺激後肌肉收縮力度的結果。試從突觸傳遞的角度解釋此現象。（3分）",

            }
        ]
    },
    {
        title: "【第 4 題】",

        scenario: "為了提升溫室番茄的產量，農業科學家研究了二氧化碳濃度對番茄植株光合作用速率的影響。研究人員在環境二氧化碳濃度（0.04%）下，量度了番茄植株在不同光強度（從極低到極高）下的光合作用速率，並繪製成一條關係曲線。結果顯示，曲線在達到某個高光強度後開始平穩。<br><br><b>【突發變動 / 假說】</b>：研究人員隨後將溫室內的二氧化碳濃度人工提升至 0.15%，並保持溫度不變，再次量度並繪製一條新的曲線。",
        parts: [
            {
                label: " ",
                question: "預測這條新曲線在「低光強度」及「高光強度」區域的走向與原曲線有何不同？解釋背後的生物學原理。（4分）",
                answer: "<span class='keyword'>預測結果 (2分)：</span>在低光強度下，新曲線與原曲線重疊（無顯著差異）。(1)<br>在高光強度下，新曲線會<span class='keyword'>高於原曲線</span>，並在一個較高的速率水平才趨向平穩。(1)<br><span class='keyword'>原理解釋 (2分)：</span>在低光強度下，光強度是光合作用的<span class='keyword'>限制因素</span>，因此額外提供二氧化碳不會加快反應速率。(1)<br>在高光強度下，原本的限制因素是二氧化碳濃度。當二氧化碳濃度提升（限制解除），碳固定的速率增加，整體光合作用速率隨之上升，直至其他因素成為限制。(1)"
            }
        ]
    },
    {
        title: "【第 5 題】",
        concept: "蒸騰作用與氣孔控制",
        scenario: "植物學家在極端乾旱的沙漠觀察到一種特有灌木。科學家提出假說：「當根部感測到土壤水分嚴重不足時，會合成一種名為脫落酸（ABA）的化學信號，經由木質部輸送到葉片，直接誘發氣孔完全關閉以減少水分流失。」為了驗證假說，研究人員利用了該種灌木的基因突變株（其根部缺乏合成 ABA 的能力）進行受控的溫室實驗。這些突變株被種植在水分充足的土壤中，並使用泡狀蒸騰計（Potometer）持續量度其穩定的蒸騰速率。<br><br><b>【突發變動 / 假說】</b>：在正午時分，研究人員利用微型注射器，直接向突變株莖部的木質部注入人工合成的 ABA 溶液（土壤水分維持充足）。",
        parts: [
            {
                label: " ",
                question: "倘若上述假說正確，預測在注入 ABA 後的短時間內，泡狀蒸騰計量度到的蒸騰速率會發生什麼變化？解釋其機制。（3分）",

            }

        parts: [

                answer: "<span class='keyword'>預測結果 (2分)：</span>實驗組大鼠的尿液總體積會<span class='keyword'>較大（多）</span>。(1)<br>實驗組大鼠的尿液濃度會<span class='keyword'>較低（較稀釋）</span>。(1)<br><span class='keyword'>原理解釋 (2分)：</span>血液中抗利尿激素（ADH）水平下降，會導致腎臟集尿管（及遠曲小管）的<span class='keyword'>透水性降低</span>。(1)<br>因此，較少水分能從濾液中被重吸收回血液內，導致大量多餘水分留在尿液中排出體外。(1)"

    {

        concept: "細胞水勢、滲透作用與質壁分離",
        scenario: "為應對海水倒灌導致的農地鹽鹼化問題，農業科學家培育了一種基因改造水稻（品種 T）。該品種的根部細胞能夠在液泡中積累極高濃度的無害可溶性醣類。野生型水稻（品種 W）則缺乏此能力。科學家將兩種水稻種植在標準的水耕營養液中，兩者均生長良好，細胞處於膨脹狀態。<br><br><b>【突發變動 / 假說】</b>：研究人員突然將水耕系統中的標準營養液，全部替換為模擬海水的高鹽度溶液。",
        parts: [
            {
                label: " ",
                question: "預測 24 小時後，品種 W 和品種 T 的葉片外觀會分別發生什麼變化？試從細胞水勢的角度解釋此預測。（4分）",
                answer: "<span class='keyword'>預測結果 (2分)：</span>品種 W 的葉片會萎蔫 / 枯萎。(1)<br>品種 T 的葉片將<span class='keyword'>保持硬挺</span> / 正常外觀。(1)<br><span class='keyword'>原理解釋 (2分)：</span>高鹽度溶液的水勢顯著低於品種 W 根部細胞的水勢，導致水分經滲透作用流失，細胞失去膨壓（<span class='keyword'>質壁分離</span>）而萎蔫。(1)<br>品種 T 因為細胞內積累了大量可溶性醣類，大幅<span class='keyword'>降低了其細胞液的水勢</span>，使其水勢能保持在低於或等於高鹽度溶液的水平，從而防止水分流失（或繼續吸水），保持細胞膨脹。(1)"
            }

        parts: [

        scenario: "農業科學家在一個設有嚴格環境控制的溫室內種植番茄。溫室內的溫度維持在最佳水平（25°C），並提供極強的人工光源。科學家持續量度番茄植株的氧氣釋放率（代表光合作用速率），發現其速率維持在一個穩定的平台期，沒有再隨光照時間延長而上升。<br><br><b>【突發變動 / 假說】</b>：科學家提出假說：「在此環境下，二氧化碳濃度是光合作用的限制因素。」為了驗證假說，研究人員將溫室內的二氧化碳濃度從正常的 0.04% 瞬間提升至 0.15%。",
        parts: [
            {
                label: " ",
                question: "若科學家的假說正確，預測提升二氧化碳濃度後，番茄植株的氧氣釋放率會出現什麼變化？試解釋背後的生物學原理。（3 分）",
                answer: "<span class='keyword'>預測 (1分)：</span>氧氣釋放率會<span class='keyword'>上升 / 增加</span>（然後可能達到一個新的平台期）。(1)<br><span class='keyword'>原理解釋 (2分)：</span>在強光及適宜溫度下，這兩個因素已不是限制因素。提高二氧化碳濃度能提供<span class='keyword'>更多原料</span>供光合作用（碳固定）使用。(1)<br>光合作用速率加快，導致光反應中水分分解產生的氧氣量隨之增加。(1)"
            }
        ]
    }
];
    let currentQuestionIndex = 0;

    // 保留你聰明的 renderQuestion 函數 (隱藏空貼士)，並加入清空 AI 對話框的功能
    function renderQuestion() {
        const q = questionsDatabase[currentQuestionIndex];
        let htmlContent = `
            <div class="scenario-box">
                <h3 style="margin-top:0; color: #334155;">${q.title}</h3>
                <p><strong>情境：</strong> ${q.scenario}</p>
            </div>
        `;

        q.parts.forEach(part => {
            // 你的完美邏輯：如果這個 part 的 hint 不是空的，才生成貼士按鈕
            let hintHTML = ""; 
            if (part.hint && part.hint.trim() !== "") {
                const formattedHint = part.hint.replace(/\n/g, '<br>');
                hintHTML = `
                    <details>
                        <summary>💡 俾個貼士我 <span>▼</span></summary>
                        <div class="content">${formattedHint}</div>
                    </details>
                `;
            }
            
            htmlContent += `
                <div class="question-part">
                    <div class="question-text">${part.label} ${part.question}</div>
                    ${hintHTML}
                    <details>
                        <summary>👀 睇參考答案 <span>▼</span></summary>
                        <div class="content">${part.answer}</div>
                    </details>
                </div>
            `;
        });

        document.getElementById('quiz-container').innerHTML = htmlContent;
        document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1} / ${questionsDatabase.length}`;
        
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('next-btn').disabled = currentQuestionIndex === questionsDatabase.length - 1;

        // 【新增】：切換題目時，自動清空舊的 AI 對話紀錄
        document.getElementById('student-input').value = "";
        document.getElementById('ai-response-box').style.display = "none";
    }

    function changeQuestion(step) {
        currentQuestionIndex += step;
        renderQuestion();
    }

    // 【新增】：將資料打包並送給 AI 伺服器的非同步函數
    async function submitToAI() {
        const studentInput = document.getElementById('student-input').value;
        if (!studentInput.trim()) {
            alert("同學，請先輸入你的答案或者問題！");
            return;
        }

        const btn = document.getElementById('submit-btn');
        const responseBox = document.getElementById('ai-response-box');
        const responseText = document.getElementById('ai-response-text');

        // 改變按鈕狀態，顯示正在思考
        btn.disabled = true;
        btn.innerText = "⏳ AI 正在批改中，請稍候...";
        responseBox.style.display = "block";
        responseText.innerHTML = "<span style='color:#64748b;'><em>思考中... (通常需要 3-5 秒)</em></span>";

        // 自動打包目前的題目情境與標準答案給 AI
        const q = questionsDatabase[currentQuestionIndex];
        let contextData = "【情境】：\n" + q.scenario.replace(/<br>/g, "\n") + "\n\n";
        let answerData = "";
        q.parts.forEach(p => {
            contextData += p.label + " " + p.question + "\n";
            answerData += p.label + " " + p.answer.replace(/<[^>]*>?/gm, '') + "\n"; // 移除 HTML 標籤
        });

        try {
            // 呼叫你的 Google Apps Script
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    studentAnswer: studentInput,
                    questionContext: contextData,
                    standardAnswer: answerData
                })
            });

            const data = await response.json();
            
            // 顯示 AI 的回覆（將 \n 換成 <br> 以利排版）
            responseText.innerHTML = data.reply.replace(/\n/g, '<br>');

        } catch (error) {
            responseText.innerHTML = "<span style='color:red;'>❌ 連線失敗。請檢查你的網絡，或確保 GAS 網址已正確貼上。</span>";
            console.error(error);
        } finally {
            // 恢復按鈕
            btn.disabled = false;
            btn.innerText = "📤 再次送出 / 追問";
        }
    }

    window.onload = renderQuestion;
</script>
<script src="tracking.js"></script>
